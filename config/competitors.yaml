# ═══════════════════════════════════════════════════════════════════
# Growth monitoring config (issue #19)
# ═══════════════════════════════════════════════════════════════════
#
# Used by aibp.growth.competitor_monitor (weekly cron). Requires
# TGSTAT_API_TOKEN in .env for competitor analytics; the subscriber-dynamics
# part of the report works without it.
#
# ВАЖНО: закупка рекламы НЕ автоматизирована и не будет. Отчёт даёт только
# рекомендацию с оценкой максимальной оправданной цены поста; решение и
# оплата — за человеком (prohibited actions: покупка/перевод денег).

# Сколько стоит один подписчик для канала (оценка LTV, ₽).
# Определяет порог "стоит/не стоит" в рекомендациях.
subscriber_value_rub: 50

# Какая доля охвата рекламного поста конвертируется в подписку (%, оценка).
# 1.0 = 1% от avg_post_reach. Уточнять по факту первых закупок.
assumed_conversion_pct: 1.0

# 3-5 каналов-конкурентов для еженедельного отчёта (username без @).
channels: []
  # - username: example_ai_channel
  #   note: "прямой конкурент, та же ниша"

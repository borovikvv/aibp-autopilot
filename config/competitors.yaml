# ═══════════════════════════════════════════════════════════════════
# Growth monitoring config (issue #19)
# ═══════════════════════════════════════════════════════════════════
#
# Used by aibp.growth.competitor_monitor (weekly cron). Requires
# TGSTAT_API_TOKEN in .env for competitor analytics; the subscriber-dynamics
# part of the report works without it.
#
# ВАЖНО: закупка рекламы НЕ автоматизирована и не будет. Отчёт даёт только
# рекомендацию с оценкой максимальной оправданной цены поста; решение и
# оплата — за человеком (prohibited actions: покупка/перевод денег).

# Сколько стоит один подписчик для канала (оценка LTV, ₽).
# Определяет порог "стоит/не стоит" в рекомендациях.
# 2026-07-22: 50 → 150 (решение владельца) — канал монетизируется офферами,
# 50₽ отсекало все реальные закупки (лучший биржевой CPS ~108₽).
subscriber_value_rub: 150

# Какая доля охвата рекламного поста конвертируется в подписку (%, оценка).
# 1.0 = 1% от avg_post_reach. Уточнять по факту первых закупок.
assumed_conversion_pct: 1.0

# 3-5 каналов-конкурентов для еженедельного отчёта (username без @).
# Это же — пул доноров для `aibp ad-plan <username>` (issue #39).
# ВАЖНО: перед первой закупкой сверить username и живость канала на tgstat.ru —
# каналы переименовываются, аудитория меняется.
channels:
  - username: seeallochnaya
    note: "Сиолошная — разборы LLM/индустрии, большая RU-аудитория; смежная ниша"
  - username: ai_newz
    note: "эйай ньюз — новости ИИ от research scientist; смежная ниша"
  - username: denissexy
    note: "Denis Sexy IT — ИИ/технологии для широкой аудитории"
  - username: ai_machinelearning_big_data
    note: "Machinelearning — крупный RU-канал про ML/ИИ"
  - username: data_secrets
    note: "Data Secrets — новости и мемы про ИИ, активная аудитория"

  # ── Доноры для закупки рекламы (подбор 2026-07-22, поиск + telega.in) ──
  # Цены/CPS — снимок биржи telega.in на 22.07; прогноз CPS = цена /
  # (подписчики × ERR × конверсия 1%). Перед закупкой сверить на tgstat.ru
  # (график прироста без ступенек = без накрутки).
  - username: MindfluxAI

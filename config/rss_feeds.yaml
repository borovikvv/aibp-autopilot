# Default RSS feeds for @AI_Business_Pulse
# Channel focus: practical AI adoption in business workflows
#
# Format:
#   - name: human-readable name
#     url: RSS feed URL
#     category: news | blog | research | company | cases | regulation
#     weight: 1.0 (default), can be adjusted per-feed
#     lang: en | ru

feeds:
  # ─── Major AI news ────────────────────────────────────────────
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    category: news
    weight: 1.0
    lang: en

  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    category: news
    weight: 1.0
    lang: en

  - name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    category: news
    weight: 0.9
    lang: en

  - name: MIT Technology Review AI
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed
    category: news
    weight: 1.1
    lang: en

  # ─── Company blogs ────────────────────────────────────────────
  - name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    category: company
    weight: 1.2
    lang: en

  - name: Google AI Blog
    url: https://blog.research.google/feeds/posts/default?alt=rss
    category: company
    weight: 1.0
    lang: en

  # NOTE: Anthropic, Meta AI, and Microsoft AI blog feeds were removed in
  # task 3.2 — their RSS endpoints returned 404/410 and no working
  # alternative could be verified. See .superpowers/sdd/task-3.2-report.md.

  # ─── Research ─────────────────────────────────────────────────
  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    category: research
    weight: 1.0
    lang: en

  - name: Sebastian Raschka Blog
    url: https://sebastianraschka.com/rss_feed.xml
    category: research
    weight: 0.9
    lang: en

  - name: arXiv cs.AI
    url: https://rss.arxiv.org/rss/cs.AI
    category: research
    weight: 1.0
    lang: en

  - name: Stanford CRFM
    url: https://crfm.stanford.edu/feed.xml
    category: research
    weight: 1.0
    lang: en

  - name: LessWrong
    url: https://www.lesswrong.com/feed.xml
    category: research
    weight: 0.8
    lang: en

  # ─── Cases / implementation ───────────────────────────────────
  - name: MIT Sloan Management Review
    url: https://sloanreview.mit.edu/feed/
    category: cases
    weight: 1.1
    lang: en

  # ─── Regulation ───────────────────────────────────────────────
  - name: GDPRhub Recent Changes
    url: https://gdprhub.eu/index.php?title=Special:RecentChanges&feed=rss
    category: regulation
    weight: 0.9
    lang: en

  - name: EFF Updates
    url: https://www.eff.org/rss/updates.xml
    category: regulation
    weight: 0.9
    lang: en

  # ─── Russian sources ──────────────────────────────────────────
  # NOTE: Habr AI and TAdviser were removed in task 3.2 — Habr's hub RSS
  # endpoints all returned 404 (no working variant found), and the TAdviser
  # URL was a non-feed page that failed to parse. See task-3.2-report.md.
  - name: VC.ru
    url: https://vc.ru/rss/all
    category: news
    weight: 1.0
    lang: ru

  - name: Forklog
    url: https://forklog.com/feed/
    category: news
    weight: 0.9
    lang: ru

# ─── Collection settings ─────────────────────────────────────────
settings:
  # Max items per feed per run
  max_items_per_feed: 20

  # Skip items older than this (days)
  max_age_days: 14

  # Dedup by URL hash
  dedup: true

  # User agent for fetching
  user_agent: "AIBP-Autopilot/1.0 (+https://t.me/AI_Business_Pulse)"

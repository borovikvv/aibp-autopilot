# Default RSS feeds for @AI_Business_Pulse
# Channel focus: practical AI adoption in business workflows
#
# Format:
#   - name: human-readable name
#     url: RSS feed URL
#     category: news | blog | research | company | cases | regulation
#     weight: 1.0 (default), can be adjusted per-feed
#     lang: en | ru

feeds:
  # ─── Major AI news ────────────────────────────────────────────
  - name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    category: news
    weight: 1.0
    lang: en

  - name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    category: news
    weight: 1.0
    lang: en

  - name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    category: news
    weight: 0.9
    lang: en

  - name: MIT Technology Review AI
    url: https://www.technologyreview.com/topic/artificial-intelligence/feed
    category: news
    weight: 1.1
    lang: en

  # ─── Company blogs ────────────────────────────────────────────
  - name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    category: company
    weight: 1.2
    lang: en

  - name: Google AI Blog
    url: https://blog.research.google/feeds/posts/default?alt=rss
    category: company
    weight: 1.0
    lang: en

  # Company coverage restored (issue #44). Anthropic/Meta have no native RSS;
  # Microsoft's blogs.microsoft.com/ai/feed/ is 410 Gone but news.microsoft.com
  # still serves a working AI category feed. DeepMind and Mistral are native.
  - name: Microsoft AI (Source)
    url: https://news.microsoft.com/source/topics/ai/feed/
    category: company
    weight: 1.0
    lang: en

  - name: Google DeepMind
    url: https://deepmind.google/blog/rss.xml
    category: company
    weight: 1.1
    lang: en

  - name: Mistral AI
    url: https://mistral.ai/rss.xml
    category: company
    weight: 0.9
    lang: en

  # ─── Research ─────────────────────────────────────────────────
  - name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    category: research
    weight: 1.0
    lang: en

  - name: Sebastian Raschka Blog
    url: https://sebastianraschka.com/rss_feed.xml
    category: research
    weight: 0.9
    lang: en

  - name: arXiv cs.AI
    url: https://rss.arxiv.org/rss/cs.AI
    category: research
    weight: 1.0
    lang: en

  - name: Stanford CRFM
    url: https://crfm.stanford.edu/feed.xml
    category: research
    weight: 1.0
    lang: en

  - name: LessWrong
    url: https://www.lesswrong.com/feed.xml
    category: research
    weight: 0.8
    lang: en

  # ─── Cases / implementation ───────────────────────────────────
  - name: MIT Sloan Management Review
    url: https://sloanreview.mit.edu/feed/
    category: cases
    weight: 1.1
    lang: en

  # Forrester fills the consulting-case-study gap (McKinsey/BCG/Deloitte killed
  # RSS). Google News aggregator re-surfaces their content + named ROI stories.
  - name: Forrester Blogs
    url: https://www.forrester.com/blogs/feed
    category: cases
    weight: 1.1
    lang: en

  - name: Google News — GenAI enterprise ROI
    url: https://news.google.com/rss/search?q=%22generative+AI%22+enterprise+results+OR+ROI+OR+%22cost+savings%22&hl=en-US&gl=US&ceid=US:en
    category: cases
    weight: 0.8
    lang: en

  # ─── Regulation ───────────────────────────────────────────────
  # GDPRhub (wiki edits) and EFF (general digital rights) replaced with
  # AI-regulation-specific feeds (issue #44).
  - name: EU AI Act
    url: https://artificialintelligenceact.eu/feed/
    category: regulation
    weight: 1.2
    lang: en

  - name: Tech Policy Press
    url: https://techpolicy.press/rss/feed.xml
    category: regulation
    weight: 1.0
    lang: en

  # ─── Russian sources ──────────────────────────────────────────
  # Habr feeds work via /ru/rss/hubs/{name}/ (the old /ru/hub/{name}/rss/
  # path was 404 — fixed path order). CNews covers enterprise AI deployments
  # in Russian companies; Proglib covers the IT-labor/AI angle.
  - name: VC.ru
    url: https://vc.ru/rss/all
    category: news
    weight: 1.0
    lang: ru

  - name: Forklog
    url: https://forklog.com/feed/
    category: news
    weight: 0.8
    lang: ru

  - name: Habr — Искусственный интеллект
    url: https://habr.com/ru/rss/hubs/artificial_intelligence/
    category: news
    weight: 1.1
    lang: ru

  - name: Habr — Машинное обучение
    url: https://habr.com/ru/rss/hubs/data_mining/
    category: research
    weight: 1.0
    lang: ru

  - name: CNews
    url: https://www.cnews.ru/inc/rss/news.xml
    category: news
    weight: 0.9
    lang: ru

  - name: Proglib
    url: https://proglib.io/feed
    category: blog
    weight: 0.8
    lang: ru

# ─── Collection settings ─────────────────────────────────────────
settings:
  # Max items per feed per run
  max_items_per_feed: 20

  # Skip items older than this (days)
  max_age_days: 14

  # Dedup by URL hash
  dedup: true

  # User agent for fetching
  user_agent: "AIBP-Autopilot/1.0 (+https://t.me/AI_Business_Pulse)"
